<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#080810"/>
  
  <!-- Purple glow circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.3"/>
  
  <!-- Q letter -->
  <text
    x="256"
    y="310"
    font-family="Georgia, serif"
    font-size="280"
    font-weight="900"
    text-anchor="middle"
    fill="url(#grad)"
  >Q</text>
  
  <!-- Go text -->
  <text
    x="256"
    y="420"
    font-family="Georgia, serif"
    font-size="100"
    font-weight="700"
    text-anchor="middle"
    fill="#06b6d4"
    letter-spacing="12"
  >GO</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
