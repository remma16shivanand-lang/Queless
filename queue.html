<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QueueLess — Join Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --white:#f5f2eb; --accent:#ff5c2b; --accent2:#ffd166; --gray:#1c1c1c; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; border-bottom: 1px solid #1c1c1c; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; text-decoration: none; color: var(--white); }
    .logo span { color: var(--accent); }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .card { background: var(--gray); border: 1px solid #2a2a2a; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.4rem; }
    .card-sub { color: #777; font-size: 0.9rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: #aaa; margin-bottom: 0.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
    input, select { width: 100%; background: #111; border: 1px solid #333; border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 0.8rem 1rem; outline: none; margin-bottom: 1.2rem; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: #1c1c1c; }
    .btn { width: 100%; padding: 0.9rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #errorMsg { display: none; background: rgba(255,92,43,0.12); border: 1px solid rgba(255,92,43,0.3); color: var(--accent); border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.88rem; margin-bottom: 1rem; }
    #ticketView { display: none; text-align: center; }
    .ticket-header { margin-bottom: 1.5rem; }
    .ticket-header h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
    .position-ring { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.5rem; background: rgba(255,92,43,0.08); box-shadow: 0 0 40px rgba(255,92,43,0.2); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(255,92,43,0.2); } 50% { box-shadow: 0 0 60px rgba(255,92,43,0.4); } }
    #positionNum { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
    #positionLabel { font-size: 0.75rem; color: #888; font-weight: 500; margin-top: 0.3rem; }
    .eta-box { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .eta-label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
    #etaText { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--accent2); }
    .info-row { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; }
    .info-chip { flex: 1; background: #111; border: 1px solid #222; border-radius: 10px; padding: 0.8rem; text-align: center; }
    .info-chip .val { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .info-chip .lbl { font-size: 0.72rem; color: #666; margin-top: 0.2rem; text-transform: uppercase; }
    #statusBadge { display: inline-block; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.8rem; border-radius: 999px; margin-bottom: 1.5rem; }
    .leave-btn { background: transparent; border: 1px solid #333; color: #666; border-radius: 10px; width: 100%; padding: 0.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-top: 0.5rem; }
    .leave-btn:hover { border-color: var(--accent); color: var(--accent); }
    .token-box { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; }
    .token-box .token-label { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
    .token-box .token-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--white); }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">Queue<span>Less</span></a>
    <span style="color:#555;font-size:0.85rem;">Customer</span>
  </nav>
  <main>
    <div class="card">
      <div id="joinForm">
        <div class="card-title">Join Queue</div>
        <div class="card-sub">Enter your details to get your token</div>
        <div id="errorMsg"></div>
        <label for="nameInput">Your Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Ravi Kumar" autocomplete="off"/>
        <label for="queueType">Queue Type</label>
        <select id="queueType">
          <option value="general">🟢 General</option>
          <option value="emergency">🔴 Emergency</option>
          <option value="followup">🔵 Follow-up / Appointment</option>
        </select>
        <button class="btn" id="joinBtn" onclick="joinQueue()">Get My Token →</button>
      </div>
      <div id="ticketView">
        <div class="ticket-header">
          <h2>Your Token 🎫</h2>
          <p id="ticketName" style="color:var(--accent);font-weight:600;font-size:1rem;margin-top:0.3rem;"></p>
        </div>
        <span id="statusBadge">WAITING</span>
        <div class="position-ring">
          <div id="positionNum">—</div>
          <div id="positionLabel">Loading...</div>
        </div>
        <div class="token-box">
          <div class="token-label">Your Token Number</div>
          <div class="token-val" id="myToken">—</div>
        </div>
        <div class="info-row">
          <div class="info-chip"><div class="val" id="totalWaiting">—</div><div class="lbl">In Queue</div></div>
          <div class="info-chip"><div class="val" id="ticketQueue" style="font-size:0.85rem;">—</div><div class="lbl">Queue Type</div></div>
        </div>
        <div class="eta-box">
          <span class="eta-label">⏱ Est. Wait</span>
          <span id="etaText">Calculating...</span>
        </div>
        <p style="color:#555;font-size:0.8rem;margin-bottom:1rem;">Keep this page open. Position updates live as queue moves.</p>
        <button class="leave-btn" onclick="leaveQueue()">Leave Queue</button>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAtdD2Ppri0JAGIDR8aOOn_PLfjGc5q5j4",
      authDomain: "queless-79a19.firebaseapp.com",
      databaseURL: "https://queless-79a19-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "queless-79a19",
      storageBucket: "queless-79a19.firebasestorage.app",
      messagingSenderId: "661569229761",
      appId: "1:661569229761:web:b7e05c6a22836c724e1540"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var myTokenKey = null;
    var myQueueType = null;

    function joinQueue() {
      var name = document.getElementById('nameInput').value.trim();
      var qtype = document.getElementById('queueType').value;
      if (!name) { showError('Please enter your name'); return; }
      var btn = document.getElementById('joinBtn');
      btn.disabled = true;
      btn.textContent = 'Joining...';

      // Use a server timestamp + random to guarantee unique position
      var joinedAt = Date.now() + Math.random();
      var newRef = db.ref('queues/' + qtype).push();

      // Count existing waiting to assign token number
      db.ref('queues/' + qtype).once('value').then(function(snapshot) {
        var tokenNum = 1;
        if (snapshot.exists()) {
          var active = Object.values(snapshot.val()).filter(function(e) {
            return e.status === 'waiting' || e.status === 'called';
          });
          tokenNum = active.length + 1;
        }
        var tokenLabel = qtype.charAt(0).toUpperCase() + String(tokenNum).padStart(3, '0');
        return newRef.set({
          name: name,
          token: tokenLabel,
          status: 'waiting',
          joinedAt: joinedAt,
          queueType: qtype
        });
      }).then(function() {
        myTokenKey = newRef.key;
        myQueueType = qtype;
        localStorage.setItem('ql_token', myTokenKey);
        localStorage.setItem('ql_queue', myQueueType);
        document.getElementById('ticketName').textContent = name;
        var labels = { general: 'General', emergency: 'Emergency', followup: 'Follow-up' };
        document.getElementById('ticketQueue').textContent = labels[qtype] || qtype;
        document.getElementById('joinForm').style.display = 'none';
        document.getElementById('ticketView').style.display = 'block';
        listenToPosition();
      }).catch(function(e) {
        showError('Error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Get My Token →';
      });
    }

    function listenToPosition() {
      db.ref('queues/' + myQueueType).on('value', function(snapshot) {
        if (!snapshot.exists()) return;
        var all = snapshot.val();
        var myData = all[myTokenKey];
        if (!myData) return;

        // Show token number
        document.getElementById('myToken').textContent = myData.token || '—';

        // All waiting sorted by join time
        var waiting = Object.entries(all)
          .filter(function(e) { return e[1].status === 'waiting'; })
          .sort(function(a, b) { return a[1].joinedAt - b[1].joinedAt; });

        var allActive = Object.entries(all)
          .filter(function(e) { return e[1].status === 'waiting' || e[1].status === 'called'; });

        document.getElementById('totalWaiting').textContent = allActive.length;

        if (myData.status === 'called') {
          document.getElementById('positionNum').textContent = '🎉';
          document.getElementById('positionLabel').textContent = "It's your turn!";
          document.getElementById('etaText').textContent = 'Please proceed now';
          document.getElementById('statusBadge').textContent = 'CALLED';
          document.getElementById('statusBadge').style.background = '#22c55e';
        } else if (myData.status === 'done') {
          document.getElementById('positionNum').textContent = '✓';
          document.getElementById('positionLabel').textContent = 'Completed';
          document.getElementById('etaText').textContent = 'Thank you for using QueueLess!';
          document.getElementById('statusBadge').textContent = 'DONE';
          document.getElementById('statusBadge').style.background = '#555';
        } else {
          var myIndex = waiting.findIndex(function(e) { return e[0] === myTokenKey; });
          var pos = myIndex + 1;
          document.getElementById('positionNum').textContent = pos;
          document.getElementById('positionLabel').textContent = pos === 1 ? 'You are Next!' : 'Position in queue';
          var etaMins = Math.max(1, (pos - 1) * 5);
          document.getElementById('etaText').textContent = pos === 1 ? "Get ready — you're next!" : '~' + etaMins + ' min wait';
        }
      });
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    function leaveQueue() {
      if (confirm('Leave the queue? You will lose your position.')) {
        if (myTokenKey && myQueueType) {
          db.ref('queues/' + myQueueType + '/' + myTokenKey).remove();
        }
        localStorage.removeItem('ql_token');
        localStorage.removeItem('ql_queue');
        location.reload();
      }
    }

    // Restore session on page reload
    var savedKey = localStorage.getItem('ql_token');
    var savedQueue = localStorage.getItem('ql_queue');
    if (savedKey && savedQueue) {
      myTokenKey = savedKey;
      myQueueType = savedQueue;
      db.ref('queues/' + savedQueue + '/' + savedKey).once('value').then(function(snap) {
        if (snap.exists() && snap.val().status !== 'done') {
          document.getElementById('ticketName').textContent = snap.val().name;
          var labels = { general: 'General', emergency: 'Emergency', followup: 'Follow-up' };
          document.getElementById('ticketQueue').textContent = labels[savedQueue] || savedQueue;
          document.getElementById('joinForm').style.display = 'none';
          document.getElementById('ticketView').style.display = 'block';
          listenToPosition();
        } else {
          localStorage.removeItem('ql_token');
          localStorage.removeItem('ql_queue');
        }
      });
    }
  </script>
</body>
</html>
