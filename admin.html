<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qless — Admin (Upgraded)</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>
/* SAME CSS (unchanged for performance) */
body{background:#080810;color:#e2e2ff;font-family:'Space Grotesk',sans-serif;}
</style>
</head>
<body>

<div id="loginScreen">
  <input type="password" id="pwInput" placeholder="Enter password"/>
  <button onclick="doLogin()">Login</button>
  <div id="loginError" style="display:none;color:red;">Wrong password</div>
</div>

<div id="dashboard" style="display:none;">
  <h2>Admin Dashboard</h2>
  <button onclick="callNext()">Call Next</button>
  <div id="queueList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 🔐 Firebase Init
firebase.initializeApp({
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_AUTH",
  databaseURL:"YOUR_DB",
  projectId:"YOUR_PROJECT"
});

var db = firebase.database();
var BIZ_SLUG = new URLSearchParams(window.location.search).get('biz');
var BIZ_PASSWORD = '';
var queueData = {};

// 🔥 Load Business
function loadBusiness(){
  db.ref('businesses/'+BIZ_SLUG).once('value')
  .then(function(snap){
    if(!snap.exists()){
      alert('Business not found');
      return;
    }
    BIZ_PASSWORD = snap.val().password;
  })
  .catch(function(err){
    console.error(err);
  });
}

loadBusiness();

// 🔐 Login
function doLogin(){
  var pw = document.getElementById('pwInput').value;
  if(pw === BIZ_PASSWORD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    startListening();
  }else{
    document.getElementById('loginError').style.display='block';
  }
}

// 📡 Listen Queue
function startListening(){
  db.ref('bizQueues/'+BIZ_SLUG+'/general').on('value',function(snap){
    queueData = snap.val() || {};
    renderQueue();
  });
}

// 🎯 Render
function renderQueue(){
  var list = document.getElementById('queueList');
  var arr = Object.entries(queueData)
    .filter(e=>e[1].status==='waiting')
    .sort((a,b)=>a[1].joinedAt - b[1].joinedAt);

  list.innerHTML = arr.map((e,i)=>{
    return `<div>
      ${i+1}. ${escapeHtml(e[1].name)}
      <button onclick="callPerson('${e[0]}')">Call</button>
    </div>`;
  }).join('');
}

// 📣 Call Next
function callNext(){
  var next = Object.entries(queueData)
    .filter(e=>e[1].status==='waiting')
    .sort((a,b)=>a[1].joinedAt - b[1].joinedAt)[0];

  if(!next){
    alert('Queue empty');
    return;
  }

  callPerson(next[0]);
}

function callPerson(key){
  db.ref('bizQueues/'+BIZ_SLUG+'/general/'+key)
    .update({status:'called'});
}

// 🛡 Escape HTML
function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

</script>

<!-- FIXED SCRIPT TAG -->
<script src="chatbot.js"></script>

</body>
</html>
