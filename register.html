<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qless — Register (Final Pro Version)</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>

<style>
body{margin:0;background:#080810;color:#e2e2ff;font-family:'Space Grotesk',sans-serif}
.container{max-width:600px;margin:auto;padding:20px}
.card{background:#13131f;border:1px solid #1e1e30;border-radius:16px;padding:20px;margin-top:20px}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #333;background:#0f0f1a;color:#fff}
button{padding:10px 15px;border:none;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;cursor:pointer}
.success{display:none}
</style>
</head>
<body>

<div class="container">
  <h2>🚀 Register Your Business</h2>

  <div class="card" id="formView">
    <input id="name" placeholder="Business Name"/>
    <input id="city" placeholder="City"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="register()">Register</button>
  </div>

  <div class="card success" id="successView">
    <h3>✅ You're Live!</h3>
    <p id="links"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_AUTH",
  databaseURL:"YOUR_DB",
  projectId:"YOUR_PROJECT"
});

var db = firebase.database();

function hash(str){
  return btoa(str);
}

function generateSlug(name){
  return name.toLowerCase().replace(/[^a-z0-9]/g,'-') + '-' + Date.now().toString(36);
}

function register(){
  var name=document.getElementById('name').value.trim();
  var city=document.getElementById('city').value.trim();
  var pass=document.getElementById('password').value;

  if(!name||!city||!pass){
    alert('Fill all fields');
    return;
  }

  var slug=generateSlug(name);
  var base=window.location.origin + '/';

  db.ref('businesses/'+slug).set({
    name:name,
    city:city,
    password:hash(pass),
    createdAt:Date.now()
  }).then(()=>{

    var customer=base+'queue.html?biz='+slug;
    var admin=base+'admin.html?biz='+slug;

    document.getElementById('formView').style.display='none';
    document.getElementById('successView').style.display='block';

    document.getElementById('links').innerHTML = `
      Customer: ${customer}<br><br>
      Admin: ${admin}
    `;

  }).catch(e=>{
    alert('Error: '+e.message);
  });
}

</script>

<script src="chatbot.js"></script>

</body>
</html>
